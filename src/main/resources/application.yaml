server:
  port: 8081
  shutdown: graceful
  tomcat:
    connection-timeout: 3s
    keepalive-timeout: 10s
    threads:
      max: 1000
      min-spare: 100

spring:
  application:
    name: cetakservice
  jackson:
    property-naming-strategy: SNAKE_CASE
  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: "health, info, prometheus"

  endpoint:
    health:
      show-details: never

  prometheus:
    metrics:
      export:
        enabled: true

kertaskerja:
  up-message: "KERTASKERJA CETAK SERVICE IS UP"
  services:
    perencanaan:
      name: perencanaan
      url: http://localhost:8080
      version: v1
